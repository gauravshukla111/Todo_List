<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      background: #38bdf8;
      color: black;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #334155;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Todo App</h2>
  <input type="text" id="taskInput" placeholder="Enter task...">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
  function addTask() {
    const input = document.getElementById("taskInput");
    const taskText = input.value.trim();

    if (taskText === "") return;

    const li = document.createElement("li");
    li.innerHTML = `
      <span onclick="toggleTask(this)">${taskText}</span>
      <button class="delete" onclick="deleteTask(this)">X</button>
    `;

    document.getElementById("taskList").appendChild(li);

    input.value = "";
    saveData();
  }

  function deleteTask(button) {
    button.parentElement.remove();
    saveData();
  }

  function toggleTask(task) {
    task.classList.toggle("completed");
    saveData();
  }

  function saveData() {
    localStorage.setItem("data", document.getElementById("taskList").innerHTML);
  }

  function showData() {
    document.getElementById("taskList").innerHTML = localStorage.getItem("data") || "";
  }

  showData();
</script>
</body>
</html>
